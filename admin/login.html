<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login — Grand Dima Hotel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <span class="logo">Grand Dima</span>
    <p class="sub">Owner Dashboard Login</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username" placeholder="admin">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="login-btn">Log In</button>
      <p class="login-error" id="loginError"></p>
    </form>

    <p class="login-hint">Default credentials are set in backend/.env — change them before going live.</p>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
